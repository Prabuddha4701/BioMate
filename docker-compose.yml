version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend # Docker looks for Dockerfile inside ./backend
    env_file:
      - ./backend/.env
    container_name: fastapi_app
    ports:
      - "8000:8000" # host:container — exposes backend directly
        # (useful for testing with Postman/curl)
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mydb
      # Pass environment variables here instead of hardcoding in code
      # "db" is the service name below — Docker resolves it as a hostname
    volumes:
      - ./backend:/app # Mounts your local ./backend into /app
        # Changes to .py files reflect instantly
        # without rebuilding the image (dev only)

    networks:
      - app-network

  # ── Vite + React Frontend ────────────────────────────────────────────
  frontend:
    build: ./frontend_new
    ports:
      - "3000:3000"
    volumes:
      - ./frontend_new:/app
      - /app/node_modules
      - /app/.next
    environment:
      - WATCHPACK_POLLING=true
    networks:
      - app-network
      # - CHOKIDAR_USEPOLLING=true

# ── Shared Network ───────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
    # All services on this network can reach each other by service name
    # e.g. backend can connect to "db:5432", frontend nginx proxies to "backend:8000"
